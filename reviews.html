<!doctype html>
<html lang="en-AU">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Viewix Reviews - See what our clients say about working with Viewix</title>
<meta name="description" content="Viewix reviews from real clients. Every five-star Google review of Viewix, Sydney's social video production agency - unedited, counted live.">
<link rel="canonical" href="https://viewixreviews.com.au">
<meta property="og:title" content="Viewix Reviews - Glad you're here.">
<meta property="og:description" content="See what our clients say about working with us.">
<meta property="og:image" content="https://viewixreviews.com.au/reviews/og-viewixreviews.png">
<meta property="og:url" content="https://viewixreviews.com.au">
<meta property="og:type" content="website">
<link rel="icon" type="image/png" href="/reviews/favicon-viewixreviews.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<!--
  viewixreviews.com.au — implemented from the Claude-design hand-off
  spec (docs/plans/viewix-reviews-design/viewixreviews.html). Data
  comes from GET /api/public/reviews; testimonials are build-time
  repo JSON (src/reviews-site/testimonials.json). Plan:
  docs/plans/viewix-reviews-site-scope-packet.md
-->
</head>
<body>

  <header class="hero">
    <img class="logo" src="/reviews/viewix-logo.png" alt="Viewix">
    <span class="eyebrow">Viewix Reviews</span>
    <h1>Glad you're here.</h1>
    <p class="sub">See what our clients say about working with Viewix.</p>
    <div class="badge" id="rating-badge" hidden>
      <svg class="gicon" viewBox="0 0 24 24" aria-hidden="true"><path fill="#4285F4" d="M23.5 12.27c0-.85-.08-1.66-.22-2.45H12v4.64h6.46a5.53 5.53 0 0 1-2.4 3.62v3h3.87c2.27-2.09 3.57-5.17 3.57-8.81z"/><path fill="#34A853" d="M12 24c3.24 0 5.96-1.07 7.94-2.91l-3.87-3a7.22 7.22 0 0 1-10.8-3.8H1.27v3.1A12 12 0 0 0 12 24z"/><path fill="#FBBC05" d="M5.27 14.29a7.21 7.21 0 0 1 0-4.58v-3.1H1.27a12 12 0 0 0 0 10.78l4-3.1z"/><path fill="#EA4335" d="M12 4.77c1.76 0 3.34.6 4.59 1.8l3.43-3.44A11.97 11.97 0 0 0 1.27 6.61l4 3.1A7.22 7.22 0 0 1 12 4.77z"/></svg>
      <span id="badge-text"></span>
    </div>
    <br>
    <a class="cta" href="https://viewix.com.au">www.viewix.com.au</a>
  </header>

  <section class="empty-state" aria-label="Client testimonials">
    <div class="vgrid" id="empty-vgrid"></div>
    <p class="empty-line">Reviews are syncing from Google - check back shortly.</p>
  </section>

  <main class="wall" id="wall" aria-label="Client reviews"></main>

  <button class="pause-btn" id="pause-btn" aria-pressed="false" hidden>
    <span class="ico" id="pause-ico">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="5" width="4" height="14"/><rect x="14" y="5" width="4" height="14"/></svg>
    </span>
    <span id="pause-label">Pause motion</span>
  </button>

  <footer>
    <img src="/reviews/viewix-logo.png" alt="Viewix">
    Viewix Pty Ltd · Sydney, Australia · <a href="https://viewix.com.au">viewix.com.au</a>
  </footer>

  <script type="module" src="/src/reviews-site/main.js"></script>
</body>
</html>
