# Dashboard Requests — @claude escape hatch
#
# The PRIMARY build path is the interactive `/build-dashboard-request` command
# run in Claude Code on Jeremy's Mac (asks him questions, gates structural
# changes, runs his Codex adversarial loop, then merges + ships). See
# .claude/commands/build-dashboard-request.md.
#
# This workflow no longer auto-runs on `dashboard-request` issues (that would
# double-build against the interactive flow). It stays only as a manual escape
# hatch: comment `@claude ...` on an issue or PR to have Claude act on it.
#
# Auth: CLAUDE_CODE_OAUTH_TOKEN (subscription, not metered API).

name: Dashboard Requests — @claude escape hatch

on:
  issue_comment:
    types: [created]

concurrency:
  group: dashboard-request-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  claude:
    if: github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: |
            --max-turns 25
            --model claude-opus-4-8
          prompt: |
            Respond to the @claude request in this issue/PR comment. If asked to
            implement something, do it scoped to the request, run the build, and
            open a PR that says "Closes #<issue number>". Surface any assumptions
            in the PR description. Do not merge.
